<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📓 两年日记 · Meta ARG</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      --bg-light: #fdf8f0;
      --bg-dark: #1a0e0b;
      --paper-light: #fff9ef;
      --paper-dark: #1e1410;
      --text-light: #3e2e23;
      --text-dark: #d4c5b5;
      --accent-light: #e3b37c;
      --accent-dark: #6d2e2e;
      --border-light: #d9c6b0;
      --border-dark: #4a2e2a;
      --glow-light: #fff1d6;
      --glow-dark: #2c0e0a;
      --shadow-light: 0 8px 20px rgba(0,0,0,0.05);
      --shadow-dark: 0 8px 20px rgba(0,0,0,0.6);
      
      background: var(--bg-light);
      color: var(--text-light);
      font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.4s ease, color 0.3s ease;
      margin: 0;
    }

    body.horror-mode {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    .game-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 顶部区域：标题 + 小游戏 */
    .header-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: var(--paper-light);
      padding: 18px 25px;
      border-radius: 48px 16px 48px 16px;
      box-shadow: var(--shadow-light);
      border: 1px solid var(--border-light);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    body.horror-mode .header-area {
      background: var(--paper-dark);
      border-color: var(--border-dark);
      box-shadow: var(--shadow-dark);
    }

    h1 {
      font-weight: 400;
      letter-spacing: 6px;
      font-size: 2.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 span {
      font-size: 1.8rem;
      opacity: 0.7;
    }
    body.horror-mode h1 {
      text-shadow: 0 0 8px #7a2e2e;
    }

    /* 纯真小游戏 —— 收集星光 / 黑暗 */
    .mini-game {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(227, 179, 124, 0.15);
      padding: 10px 22px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      transition: background 0.3s;
    }
    body.horror-mode .mini-game {
      background: rgba(109, 46, 46, 0.25);
    }
    .star-counter {
      font-size: 1.7rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .collect-btn {
      background: #ffe3b7;
      border: none;
      border-radius: 40px;
      padding: 10px 24px;
      font-size: 1.2rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 3px 0 #c29a6b;
      transition: 0.1s ease;
      color: #3e2e23;
      border: 1px solid #eecfaa;
      font-weight: 500;
    }
    body.horror-mode .collect-btn {
      background: #3f1e1a;
      box-shadow: 0 3px 0 #1f0e0b;
      color: #d4bfb5;
      border-color: #6f3a32;
    }
    .collect-btn:active {
      transform: translateY(3px);
      box-shadow: none;
    }

    /* 搜索栏 */
    .search-section {
      display: flex;
      gap: 10px;
      margin: 5px 0 5px 0;
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      font-size: 1.1rem;
      background: var(--paper-light);
      border: 2px solid var(--border-light);
      border-radius: 60px;
      color: var(--text-light);
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    body.horror-mode .search-input {
      background: #261612;
      border-color: #542e28;
      color: #e2cfc2;
    }
    .search-input:focus {
      border-color: #b5835a;
      box-shadow: 0 0 0 3px rgba(181,131,90,0.2);
    }
    .search-btn {
      padding: 0 30px;
      border-radius: 60px;
      background: #dbb48b;
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
      color: #2d1f14;
      cursor: pointer;
      border: 1px solid #c4a27e;
      transition: 0.2s;
    }
    body.horror-mode .search-btn {
      background: #522e26;
      color: #ebdbcf;
      border-color: #7b463b;
    }
    .search-btn:hover {
      filter: brightness(0.96);
    }

    /* 主内容：日记卡片 + 线索面板 */
    .diary-panel {
      display: flex;
      flex-direction: row;
      gap: 20px;
    }
    .diary-card {
      flex: 2.5;
      background: var(--paper-light);
      border-radius: 24px 8px 24px 8px;
      padding: 30px 28px;
      box-shadow: var(--shadow-light);
      border: 1px solid var(--border-light);
      transition: background 0.3s, border 0.3s, box-shadow 0.3s;
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }
    body.horror-mode .diary-card {
      background: var(--paper-dark);
      border-color: var(--border-dark);
      box-shadow: var(--shadow-dark);
    }

    .diary-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px dashed var(--border-light);
      padding-bottom: 12px;
      margin-bottom: 22px;
      font-size: 1.3rem;
    }
    body.horror-mode .diary-header {
      border-bottom-color: #5a342c;
    }
    .diary-date {
      font-weight: 600;
      letter-spacing: 1px;
    }
    .diary-content {
      font-size: 1.2rem;
      line-height: 1.7;
      white-space: pre-wrap;
      flex: 1;
    }
    .diary-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
    }
    .nav-btn {
      background: none;
      border: 1.5px solid var(--border-light);
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      background: rgba(255,245,235,0.6);
      color: inherit;
      transition: 0.2s;
    }
    body.horror-mode .nav-btn {
      background: #2b1814;
      border-color: #643e36;
    }
    .nav-btn:hover {
      background: var(--accent-light);
      color: #1e130f;
    }

    /* 右侧线索区 */
    .clue-box {
      flex: 1.2;
      background: var(--paper-light);
      border-radius: 16px 24px 16px 24px;
      padding: 22px 18px;
      box-shadow: var(--shadow-light);
      border: 1px solid var(--border-light);
      transition: background 0.3s, border 0.3s;
    }
    body.horror-mode .clue-box {
      background: var(--paper-dark);
      border-color: var(--border-dark);
    }
    .clue-box h3 {
      font-weight: 400;
      border-bottom: 1px solid;
      padding-bottom: 8px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .clue-list {
      list-style: none;
    }
    .clue-list li {
      padding: 10px 5px;
      border-bottom: 1px dotted var(--border-light);
      font-size: 1rem;
      word-break: break-word;
    }
    body.horror-mode .clue-list li {
      border-bottom-color: #4f3029;
    }
    .empty-clue {
      opacity: 0.6;
      font-style: italic;
    }
    .search-feedback {
      margin-top: 18px;
      padding: 12px;
      background: rgba(0,0,0,0.02);
      border-radius: 20px;
      font-size: 0.95rem;
    }
    body.horror-mode .search-feedback {
      background: #1f120e;
    }

    /* 页脚meta提示 */
    .meta-note {
      text-align: right;
      font-size: 0.8rem;
      opacity: 0.6;
      letter-spacing: 2px;
    }

    /* 响应式 */
    @media (max-width: 720px) {
      .diary-panel {
        flex-direction: column;
      }
      .header-area {
        flex-direction: column;
        align-items: start;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- 头部区域：包含纯真小游戏（星光收集） -->
  <div class="header-area">
    <h1>
      <span>📓</span> 两年·日记 <span>🕯️</span>
    </h1>
    <div class="mini-game">
      <div class="star-counter">
        <span id="starIcon">✨</span> 
        <span id="starCount">0</span>
      </div>
      <button class="collect-btn" id="collectStarBtn">收集星光</button>
    </div>
  </div>

  <!-- 搜索区域 -->
  <div class="search-section">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索关键词… (试试“地下室”、“镜子”、“它”)" autocomplete="off">
    <button class="search-btn" id="searchBtn">🔍 查找</button>
  </div>

  <!-- 主体：日记 + 线索 -->
  <div class="diary-panel">
    <div class="diary-card">
      <div class="diary-header">
        <span class="diary-date" id="diaryDate">2023年1月1日</span>
        <span id="weatherIcon">☀️</span>
      </div>
      <div class="diary-content" id="diaryText">
        加载日记中...
      </div>
      <div class="diary-nav">
        <button class="nav-btn" id="prevDayBtn">◀ 前一天</button>
        <button class="nav-btn" id="nextDayBtn">后一天 ▶</button>
      </div>
    </div>

    <div class="clue-box">
      <h3>📌 发现的线索 <span id="fragmentCounter">(0/5)</span></h3>
      <ul class="clue-list" id="clueList">
        <li class="empty-clue">还没有线索，试着搜索...</li>
      </ul>
      <div class="search-feedback" id="searchFeedback">
        💡 搜索特定词会揭露秘密……
      </div>
    </div>
  </div>
  <div class="meta-note">
    <span id="metaHint">🍪 cookie: 记忆你的进度</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 全局状态 ----------
    let currentIndex = 0;                // 日记索引 0 ~ totalDays-1
    const startDate = new Date(2023, 0, 1); // 2023-01-01
    const totalDays = 730;               // 两年 (2023+2024, 闰年? 2024是闰年, 但简单按730天)
    
    // 核心状态
    let horrorActive = false;            // 画风阴森
    let collectedFragments = new Set();  // 已收集的碎片id (关键词触发)
    let starPoints = 0;                 // 小游戏积分
    
    // 线索面板展示 (已发现线索文本)
    let discoveredClues = [];            // 存储字符串
    
    // 特殊日记映射 (日期字符串 -> 内容)
    const specialDiaries = new Map();
    
    // 预设关键词与效果 (触发线索/碎片/恐怖)
    const keywordMap = new Map([
      ['地下室', { horror: true, fragment: 'basement', clue: '🔑 地下室的门后有刮痕，写着“别回头”。', permanent: true }],
      ['镜子', { horror: true, fragment: 'mirror', clue: '🪞 镜子里的人动作慢了一拍。碎片+1', permanent: true }],
      ['它', { horror: true, fragment: 'it', clue: '👁️ “它”在注视你。你感到日记中的文字在蠕动。', permanent: true }],
      ['失踪', { horror: true, fragment: 'missing', clue: '📰 邻居家孩子于2023年10月失踪…… 报纸日期被涂黑。', permanent: true }],
      ['真相', { horror: true, fragment: 'truth', clue: '📜 真相：这栋房子是“门”，你需要五枚碎片封印它。', permanent: true, finalClue: true }],
      ['猫咪', { horror: false, clue: '🐱 小橘最近总盯着空墙角。也许只是虫子。' }],
      ['阁楼', { horror: false, clue: '📦 阁楼有个上锁的箱子，刻着“M.A.”' }],
      ['钥匙', { horror: false, clue: '🗝️ 你在花盆底下找到一把生锈的钥匙。' }],
      ['ARG', { horror: false, clue: '🕹️ 你意识到这是一场游戏…… 但有些事超出了游戏。' }],
      ['cookie', { horror: false, clue: '🍪 你检查了cookie，里面藏着一段信息：THEENDISNEAR' }],
    ]);
    
    // 碎片ID列表 (用于通关)
    const fragmentIds = ['basement', 'mirror', 'it', 'missing', 'truth'];
    
    // ---------- 日记内容生成 (贯穿两年，大量日常+恐怖暗线) ----------
    function generateDiaryEntry(index) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + index);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2,'0');
      const day = String(date.getDate()).padStart(2,'0');
      const dateStr = `${year}-${month}-${day}`;
      
      // 检查特殊日记
      if (specialDiaries.has(dateStr)) {
        return { date: dateStr, content: specialDiaries.get(dateStr) };
      }
      
      // 根据季节/月份生成日常，但逐渐渗入恐怖元素 (取决于index)
      const monthIdx = date.getMonth();
      let baseText = '';
      
      // 2023上半年 —— 纯真日常
      if (year === 2023 && monthIdx < 6) {
        const pure = [
          '今天阳光真好，在院子里种了薰衣草。',
          '和小橘玩了整整一下午，它喜欢追蝴蝶。',
          '邻居送来刚烤的曲奇，很温暖。',
          '读完了那本童话书，做了个美梦。',
          '第一次在这个家过生日，很幸福。',
          '学会了做苹果派，虽然有点焦。',
          '在阁楼发现了一些老照片，家族历史很有趣。',
        ];
        baseText = pure[index % pure.length] + ' ☁️';
      } else if (year === 2023) {
        // 2023下半年 —— 开始不对劲
        const odd = [
          '夜里听到刮墙声，可能是老鼠。',
          '小橘对着走廊哈气，那里什么都没有。',
          '梦到自己在镜子前，但镜中人没动。',
          '整理地下室时觉得有点冷。',
          '今天有些头疼，日记本上的字迹好像变了？',
          '收音机偶尔传出沙沙声，像是有人在说话。',
          '墙上的影子动了一下……可能是我眼花了。',
        ];
        baseText = odd[index % odd.length];
      } else if (year === 2024 && monthIdx < 6) {
        // 2024上半年 —— 越发诡异
        const creep = [
          '已经连续一周做同一个噩梦。',
          '小橘不见了…… 希望它只是跑出去玩了。',
          '在镜子哈气，出现了一个单词：“RUN”。',
          '地下室的灯泡又坏了，我听到里面有呼吸声。',
          '日记里多了一页我不记得写过的内容。',
          '邻居说我家晚上有奇怪的光。',
          '我开始分不清梦境和现实。',
        ];
        baseText = creep[index % creep.length];
      } else {
        // 2024下半年 —— 临近真相
        const dark = [
          '“它”就在我身后。我不能回头。',
          '我找到了第五个碎片…… 必须完成仪式。',
          '房子在呼吸，墙壁在渗血。',
          '镜子里的我已经不是我了。',
          '如果我消失，请告诉别人这栋房子的真相。',
          '只有搜索所有关键词才能结束这一切。',
          '今天是最后一天。',
        ];
        baseText = dark[index % dark.length];
      }
      
      // 偶尔加一点个性
      if (index % 10 === 3) baseText += ' 我有点不安。';
      if (index % 17 === 5) baseText += ' 或许该查查老房子的历史。';
      
      return { date: dateStr, content: baseText };
    }
    
    // 填充特殊日记 (关键剧情点)
    function initSpecialDiaries() {
      specialDiaries.set('2023-03-21', '今天在阁楼发现一面古董镜子，很漂亮。把它挂在了卧室。');
      specialDiaries.set('2023-06-15', '小橘抓破了地下室的门，里面传来霉味。我不敢进去。');
      specialDiaries.set('2023-10-31', '万圣节，但邻居家孩子失踪了。警察来过。我感到寒意。');
      specialDiaries.set('2023-12-24', '平安夜，我听到壁炉里有人叫我的名字。');
      specialDiaries.set('2024-02-14', '镜子上出现了血字：“五片碎片”。我数了数，已经找到两片。');
      specialDiaries.set('2024-05-05', '我在地下室找到一本旧日记，作者写着“它来自镜子”。');
      specialDiaries.set('2024-07-19', '我快集齐碎片了。但“它”越来越强。');
      specialDiaries.set('2024-09-30', '最后一个碎片在…… 真相里。我必须搜索“真相”。');
      specialDiaries.set('2024-12-31', '仪式完成了。房子安静了。但镜子里的我笑了。 (结局？)');
    }
    initSpecialDiaries();
    
    // ---------- Cookie 操作 ----------
    function saveGameState() {
      const state = {
        currentIndex: currentIndex,
        horrorActive: horrorActive,
        fragments: Array.from(collectedFragments),
        starPoints: starPoints,
        clues: discoveredClues,
      };
      const json = JSON.stringify(state);
      document.cookie = `metaArgSave=${encodeURIComponent(json)}; path=/; max-age=${60*60*24*30}`; // 30天
    }
    
    function loadGameState() {
      const cookies = document.cookie.split('; ');
      const saveCookie = cookies.find(row => row.startsWith('metaArgSave='));
      if (!saveCookie) return false;
      try {
        const value = decodeURIComponent(saveCookie.split('=')[1]);
        const state = JSON.parse(value);
        if (state.currentIndex !== undefined) currentIndex = state.currentIndex;
        if (state.horrorActive !== undefined) horrorActive = state.horrorActive;
        if (state.fragments) collectedFragments = new Set(state.fragments);
        if (state.starPoints !== undefined) starPoints = state.starPoints;
        if (state.clues) discoveredClues = state.clues;
        return true;
      } catch(e) { return false; }
    }
    
    // ---------- UI 更新 ----------
    function updateUI() {
      // 更新日记显示
      const entry = generateDiaryEntry(currentIndex);
      document.getElementById('diaryDate').textContent = entry.date;
      document.getElementById('diaryText').textContent = entry.content;
      
      // 根据日期简单改变天气图标 (装饰)
      const weatherIcon = document.getElementById('weatherIcon');
      const dayOfYear = currentIndex % 365;
      if (dayOfYear < 90) weatherIcon.textContent = '❄️';
      else if (dayOfYear < 180) weatherIcon.textContent = '🌸';
      else if (dayOfYear < 270) weatherIcon.textContent = '☀️';
      else weatherIcon.textContent = '🍂';
      if (horrorActive) weatherIcon.textContent = '🌑';
      
      // 更新星光显示
      document.getElementById('starCount').textContent = starPoints;
      const starIcon = document.getElementById('starIcon');
      starIcon.textContent = horrorActive ? '💀' : '✨';
      
      // 更新body类
      if (horrorActive) {
        document.body.classList.add('horror-mode');
      } else {
        document.body.classList.remove('horror-mode');
      }
      
      // 更新线索面板
      const clueListEl = document.getElementById('clueList');
      const fragCount = collectedFragments.size;
      document.getElementById('fragmentCounter').textContent = `(${fragCount}/${fragmentIds.length})`;
      
      if (discoveredClues.length === 0) {
        clueListEl.innerHTML = '<li class="empty-clue">还没有线索，试着搜索...</li>';
      } else {
        clueListEl.innerHTML = discoveredClues.map(c => `<li>${c}</li>`).join('');
      }
      
      // 检查通关 (集齐碎片)
      if (fragCount === fragmentIds.length) {
        const feedback = document.getElementById('searchFeedback');
        feedback.innerHTML = '⚠️ 你集齐了五枚碎片！房子在震动…… 你听见低语：“你自由了……暂时。” (通关达成，但故事仍在延续)';
        if (!discoveredClues.includes('🏁 结局：你封印了“它”，但镜中的倒影取代了你。')) {
          discoveredClues.push('🏁 结局：你封印了“它”，但镜中的倒影取代了你。');
          saveGameState();
          updateUI();
        }
      }
      
      // meta提示
      document.getElementById('metaHint').innerHTML = horrorActive ? '🍪 cookie: 恐惧已烙印' : '🍪 cookie: 记忆你的纯真';
      
      saveGameState(); // 每次UI更新保存
    }
    
    // 搜索逻辑
    function performSearch() {
      const input = document.getElementById('searchInput');
      const query = input.value.trim();
      const feedback = document.getElementById('searchFeedback');
      if (query === '') {
        feedback.textContent = '🔎 输入关键词……';
        return;
      }
      
      const lowerQuery = query.toLowerCase();
      let matched = false;
      let feedbackMsg = '';
      
      // 遍历关键词
      for (let [keyword, effect] of keywordMap.entries()) {
        if (lowerQuery.includes(keyword.toLowerCase())) {
          matched = true;
          
          // 触发恐怖模式
          if (effect.horror && !horrorActive) {
            horrorActive = true;
            feedbackMsg += '⚠️ 画风骤变…… 你感到脊背发凉。 ';
          }
          
          // 收集碎片
          if (effect.fragment && !collectedFragments.has(effect.fragment)) {
            collectedFragments.add(effect.fragment);
            feedbackMsg += `🧩 获得碎片: ${effect.fragment} 。`;
          }
          
          // 添加线索 (避免重复)
          if (effect.clue && !discoveredClues.includes(effect.clue)) {
            discoveredClues.push(effect.clue);
          }
          
          // 特殊: 最终真相
          if (effect.finalClue) {
            if (!discoveredClues.includes('❗ 最终线索: 集齐五碎片即可封印。')) {
              discoveredClues.push('❗ 最终线索: 集齐五碎片即可封印。');
            }
          }
        }
      }
      
      // 额外彩蛋: 搜索 "help" 或 "cookie"
      if (lowerQuery.includes('help')) {
        feedbackMsg += ' 🆘 查看cookie或搜索“真相”。';
      }
      if (lowerQuery.includes('cookie')) {
        if (!discoveredClues.includes('🍪 Cookie里藏着“META-END”。')) {
          discoveredClues.push('🍪 Cookie里藏着“META-END”。');
        }
        document.cookie = `metaHint=${Date.now()}; path=/; max-age=60`;
      }
      
      if (!matched) {
        feedback.textContent = `没有关于“${query}”的直接线索…… 再试试别的词？`;
      } else {
        feedback.innerHTML = feedbackMsg || '📝 线索已记录。';
      }
      
      // 如果触发了恐怖，强制更新UI
      updateUI();
      input.value = '';
    }
    
    // 翻页
    function changeDay(delta) {
      let newIndex = currentIndex + delta;
      if (newIndex < 0) newIndex = 0;
      if (newIndex >= totalDays) newIndex = totalDays - 1;
      if (newIndex !== currentIndex) {
        currentIndex = newIndex;
        updateUI();
      }
    }
    
    // 小游戏：收集星光/黑暗
    function collectStar() {
      starPoints++;
      if (horrorActive) {
        // 恐怖模式下积累黑暗点数，但依旧增加
        document.getElementById('searchFeedback').textContent = '💀 你收集了黑暗…… 有什么在靠近。';
      } else {
        document.getElementById('searchFeedback').textContent = '✨ 星光 +1！ 感到温暖。';
      }
      // 当星光超过30且未恐怖，可以暗示
      if (starPoints > 30 && !horrorActive) {
        if (!discoveredClues.includes('🌟 星光似乎能抵挡黑暗……暂时。')) {
          discoveredClues.push('🌟 星光似乎能抵挡黑暗……暂时。');
        }
      }
      updateUI();
    }
    
    // 初始化/加载
    function initGame() {
      const hasSave = loadGameState();
      if (!hasSave) {
        // 默认起始
        currentIndex = 0;
        horrorActive = false;
        collectedFragments.clear();
        starPoints = 0;
        discoveredClues = [];
        // 初始欢迎线索
        discoveredClues.push('📖 日记从2023年元旦开始。搜索关键词寻找秘密。');
      }
      updateUI();
      
      // 事件绑定
      document.getElementById('prevDayBtn').addEventListener('click', ()=> changeDay(-1));
      document.getElementById('nextDayBtn').addEventListener('click', ()=> changeDay(1));
      document.getElementById('searchBtn').addEventListener('click', performSearch);
      document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key==='Enter') performSearch(); });
      document.getElementById('collectStarBtn').addEventListener('click', collectStar);
      
      // Meta: 在控制台输出提示 (ARG风格)
      console.log('%c📓 两年日记 · Meta ARG', 'font-size:16px; color: #b77e5c');
      console.log('%c试着搜索: 地下室、镜子、它、失踪、真相……', 'color: #9e6b4c');
      console.log('%cCookie会记住你的恐惧。', 'color: #7a4a3a');
    }
    
    initGame();
  })();
</script>
</body>
</html>
